<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Die Laughing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Outfit', sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
    }

    /* Vignette */
    #vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
      z-index: 4;
    }

    /* Grain */
    #grain {
      position: fixed;
      inset: -50%;
      width: 200%; height: 200%;
      opacity: 0.035;
      pointer-events: none;
      z-index: 5;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      animation: grain 0.4s steps(1) infinite;
    }
    @keyframes grain {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-2%, 3%); }
      50%  { transform: translate(3%, -2%); }
      75%  { transform: translate(-1%, -3%); }
      100% { transform: translate(2%, 1%); }
    }

    /* UI */
    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #logo-text {
      margin-top: 6vh;
      font-size: clamp(2.2rem, 7vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #c084fc 0%, #f472b6 60%, #fb923c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(192,132,252,0.45));
      opacity: 0;
      transform: translateY(-10px);
      animation: fadeIn 1s ease 0.3s forwards;
    }

    #tagline {
      margin-top: 0.5rem;
      font-size: clamp(0.55rem, 1.4vw, 0.8rem);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      opacity: 0;
      animation: fadeIn 1s ease 0.7s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Enter hint below patch */
    #enter-hint {
      position: fixed;
      bottom: 7%;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(0.55rem, 1.3vw, 0.75rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1s ease 1.2s forwards, breathe 2.8s ease 2s infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.3; transform: translateX(-50%) translateY(0px); }
      50%       { opacity: 0.8; transform: translateX(-50%) translateY(-5px); }
    }

    /* Page-enter fade */
    #fade {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: opacity 0.85s ease;
    }
    #fade.out { opacity: 1; }

    /* Loading screen */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      z-index: 90;
      background: #000;
      transition: opacity 0.6s ease 0.2s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    .loader-ring {
      width: 36px; height: 36px;
      border: 2px solid rgba(192,132,252,0.2);
      border-top-color: #c084fc;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="loader-ring"></div>
    <span class="loader-text">Loading</span>
  </div>

  <div id="grain"></div>
  <div id="vignette"></div>

  <div id="ui">
    <h1 id="logo-text">Die Laughing</h1>
    <p id="tagline">Philadelphia's Comedy Collective</p>
  </div>

  <div id="enter-hint">Hover the patch &mdash; click to enter</div>
  <div id="fade"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ── Renderer ───────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.5;
    document.body.appendChild(renderer.domElement);

    // ── Scene ──────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.FogExp2(0x000000, 0.035);

    // ── Camera ─────────────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.5, 7.5);

    // ── Lights ─────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.12));

    // Purple key (top-left front)
    const keyLight = new THREE.DirectionalLight(0xc084fc, 4);
    keyLight.position.set(-4, 5, 4);
    scene.add(keyLight);

    // Pink fill (right)
    const fillLight = new THREE.PointLight(0xf472b6, 5, 14);
    fillLight.position.set(5, 0, 3);
    scene.add(fillLight);

    // Blue-white rim (behind)
    const rimLight = new THREE.DirectionalLight(0x93c5fd, 2.5);
    rimLight.position.set(1, 3, -7);
    scene.add(rimLight);

    // Upward ground glow (pink)
    const groundGlow = new THREE.PointLight(0xec4899, 2.5, 10);
    groundGlow.position.set(0, -5, 2);
    scene.add(groundGlow);

    // Patch spotlight
    const patchSpot = new THREE.SpotLight(0xffffff, 6, 12, Math.PI / 8, 0.5);
    patchSpot.position.set(0, 4, 5);
    patchSpot.target.position.set(0, -2.2, 0);
    scene.add(patchSpot);
    scene.add(patchSpot.target);

    // ── Star particles ─────────────────────────────────────────────────────
    const starGeo = new THREE.BufferGeometry();
    const N = 1000;
    const pos = new Float32Array(N * 3);
    const col = new Float32Array(N * 3);
    const starColors = [
      new THREE.Color(0xffffff),
      new THREE.Color(0xc084fc),
      new THREE.Color(0xf472b6),
    ];
    for (let i = 0; i < N; i++) {
      pos[i * 3]     = (Math.random() - 0.5) * 50;
      pos[i * 3 + 1] = (Math.random() - 0.5) * 50;
      pos[i * 3 + 2] = (Math.random() - 0.5) * 50;
      const c = starColors[Math.floor(Math.random() * starColors.length)];
      col[i * 3] = c.r; col[i * 3 + 1] = c.g; col[i * 3 + 2] = c.b;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    starGeo.setAttribute('color', new THREE.BufferAttribute(col, 3));
    const starMat = new THREE.PointsMaterial({ size: 0.045, sizeAttenuation: true, vertexColors: true });
    scene.add(new THREE.Points(starGeo, starMat));

    // ── Load models ────────────────────────────────────────────────────────
    const loader = new GLTFLoader();
    let skeletonGroup = null;
    let patchGroup = null;
    let patchMeshes = [];
    let patchBaseScale = 1;
    let loadedCount = 0;

    function checkAllLoaded() {
      loadedCount++;
      if (loadedCount >= 2) {
        document.getElementById('loading').classList.add('hidden');
      }
    }

    // Skeleton — the logo
    loader.load('skeleton-comedian.glb', (gltf) => {
      skeletonGroup = gltf.scene;

      // Auto-size to ~3.8 units tall
      const box = new THREE.Box3().setFromObject(skeletonGroup);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const s = 3.8 / maxDim;
      skeletonGroup.scale.setScalar(s);

      // Center horizontally & shift up
      box.setFromObject(skeletonGroup);
      const center = box.getCenter(new THREE.Vector3());
      skeletonGroup.position.sub(center);
      skeletonGroup.position.y += 0.8;

      scene.add(skeletonGroup);
      checkAllLoaded();
    }, undefined, (err) => {
      console.error('Skeleton load error:', err);
      checkAllLoaded();
    });

    // Patch — the enter button
    loader.load('embroidered-patch.glb', (gltf) => {
      patchGroup = gltf.scene;

      // Auto-size to ~1.5 units wide
      const box = new THREE.Box3().setFromObject(patchGroup);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      patchBaseScale = 1.5 / maxDim;
      patchGroup.scale.setScalar(patchBaseScale);

      // Center, place below skeleton
      box.setFromObject(patchGroup);
      const center = box.getCenter(new THREE.Vector3());
      patchGroup.position.sub(center);
      patchGroup.position.y -= 2.3;

      // Set up emissive for glow effect & collect meshes
      patchGroup.traverse(child => {
        if (child.isMesh) {
          patchMeshes.push(child);
          if (child.material) {
            // Support multi-material arrays
            const mats = Array.isArray(child.material) ? child.material : [child.material];
            mats.forEach(mat => {
              if (mat.emissive !== undefined) {
                mat.emissive = new THREE.Color(0xf472b6);
                mat.emissiveIntensity = 0;
              }
            });
          }
        }
      });

      scene.add(patchGroup);
      checkAllLoaded();
    }, undefined, (err) => {
      console.error('Patch load error:', err);
      checkAllLoaded();
    });

    // ── Pointer / Raycaster ────────────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    const pointer   = new THREE.Vector2(9999, 9999); // off-screen default
    let hovering  = false;
    let entering  = false;

    function setPointer(x, y) {
      pointer.x =  (x / window.innerWidth)  * 2 - 1;
      pointer.y = -(y / window.innerHeight) * 2 + 1;
    }

    window.addEventListener('mousemove', e => setPointer(e.clientX, e.clientY));

    function tryEnter() {
      if (entering || !patchMeshes.length) return;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(patchMeshes, true);
      if (hits.length > 0) {
        entering = true;
        document.getElementById('fade').classList.add('out');
        setTimeout(() => { window.location.href = 'home.html'; }, 900);
      }
    }

    window.addEventListener('click', tryEnter);

    // Touch: update pointer from finger, then try
    window.addEventListener('touchend', e => {
      const t = e.changedTouches[0];
      setPointer(t.clientX, t.clientY);
      // Small delay so raycaster uses updated pointer
      requestAnimationFrame(tryEnter);
    }, { passive: true });

    // ── Animation ──────────────────────────────────────────────────────────
    const clock = new THREE.Clock();

    // Smooth camera parallax target
    let camTargetX = 0, camTargetY = 0.5;

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Camera parallax (follows mouse gently)
      camTargetX = pointer.x * 0.6;
      camTargetY = pointer.y * 0.4 + 0.5;
      camera.position.x += (camTargetX - camera.position.x) * 0.04;
      camera.position.y += (camTargetY - camera.position.y) * 0.04;
      camera.lookAt(0, 0.2, 0);

      // Skeleton: spin + float
      if (skeletonGroup) {
        skeletonGroup.rotation.y = t * 0.38;
        skeletonGroup.position.y = 0.8 + Math.sin(t * 0.85) * 0.14;
      }

      // Patch: slow counter-spin + gentle bob
      if (patchGroup) {
        patchGroup.rotation.y = -t * 0.18;
        patchGroup.position.y = -2.3 + Math.sin(t * 1.1 + 1.5) * 0.08;

        // Hover detection
        raycaster.setFromCamera(pointer, camera);
        const hits = raycaster.intersectObjects(patchMeshes, true);
        hovering = hits.length > 0;
        document.body.style.cursor = hovering ? 'pointer' : 'default';

        // Scale lerp
        const targetS = hovering ? patchBaseScale * 1.2 : patchBaseScale;
        const curS    = patchGroup.scale.x;
        const newS    = curS + (targetS - curS) * 0.1;
        patchGroup.scale.setScalar(newS);

        // Emissive glow lerp
        const targetEmissive = hovering ? 0.35 + Math.sin(t * 7) * 0.12 : 0;
        patchMeshes.forEach(mesh => {
          const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
          mats.forEach(mat => {
            if (mat.emissiveIntensity !== undefined) {
              mat.emissiveIntensity += (targetEmissive - mat.emissiveIntensity) * 0.1;
            }
          });
        });

        // Aim spotlight at patch
        patchSpot.target.position.copy(patchGroup.position);
        patchSpot.intensity = hovering ? 10 : 5;
      }

      // Animate lights for drama
      fillLight.intensity  = 4.5 + Math.sin(t * 1.4) * 0.6;
      groundGlow.position.x = Math.sin(t * 0.5) * 2.5;
      keyLight.intensity   = 3.5 + Math.sin(t * 0.7 + 1) * 0.5;

      renderer.render(scene, camera);
    }

    animate();

    // ── Resize ─────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
