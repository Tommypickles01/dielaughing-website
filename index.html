<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Die Laughing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Outfit', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
      z-index: 5;
    }

    /* Title */
    #logo-text {
      font-size: clamp(1.8rem, 6vw, 4rem);
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #c084fc 0%, #f472b6 60%, #fb923c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(192,132,252,0.5));
      animation: fadeUp 0.6s ease forwards;
      text-align: center;
      position: relative;
      z-index: 10;
    }

    #tagline {
      margin-top: 0.4rem;
      font-size: clamp(0.5rem, 1.3vw, 0.75rem);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      animation: fadeUp 0.6s ease 0.15s both;
      text-align: center;
      position: relative;
      z-index: 10;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Skeleton logo */
    #skeleton {
      width: clamp(200px, 40vw, 420px);
      aspect-ratio: 1;
      object-fit: contain;
      margin-top: clamp(16px, 3vh, 32px);
      filter: drop-shadow(0 0 24px rgba(192,132,252,0.4))
              drop-shadow(0 0 60px rgba(244,114,182,0.2));
      animation: fadeUp 0.6s ease 0.25s both, floatSkeleton 4s ease-in-out 1s infinite;
      position: relative;
      z-index: 10;
      pointer-events: none;
    }

    @keyframes floatSkeleton {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-14px); }
    }

    /* Enter patch */
    #patch-wrap {
      margin-top: clamp(12px, 2.5vh, 28px);
      position: relative;
      z-index: 10;
      animation: fadeUp 0.6s ease 0.4s both, floatPatch 4s ease-in-out 1.4s infinite;
      cursor: pointer;
    }

    @keyframes floatPatch {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }

    #patch-wrap img {
      width: clamp(160px, 28vw, 320px);
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 0 12px rgba(192,132,252,0.3));
      transition: transform 0.25s ease, filter 0.25s ease;
    }

    #patch-wrap:hover img {
      transform: scale(1.1);
      filter: drop-shadow(0 0 24px rgba(244,114,182,0.9))
              drop-shadow(0 0 48px rgba(192,132,252,0.6));
    }

    #patch-wrap:active img {
      transform: scale(1.04);
    }

    /* Hint text */
    #hint {
      margin-top: clamp(10px, 2vh, 20px);
      font-size: clamp(0.5rem, 1.2vw, 0.7rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      animation: fadeUp 0.6s ease 0.6s both, breathe 3s ease 1.5s infinite;
      position: relative;
      z-index: 10;
      pointer-events: none;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.2; }
      50%       { opacity: 0.6; }
    }

    /* Page-enter fade */
    #fade {
      position: fixed; inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: opacity 0.8s ease;
    }
    #fade.out { opacity: 1; }
  </style>
</head>
<body>

  <h1 id="logo-text">Die Laughing</h1>

<img id="skeleton" src="skeleton-logo.png" alt="Die Laughing Logo" draggable="false">

  <div id="patch-wrap" onclick="enter()" role="button" aria-label="Enter site">
    <img src="enter-patch.png" alt="Enter" draggable="false">
  </div>

  <p id="hint">Click to enter</p>

  <div id="fade"></div>

  <script>
    function enter() {
      document.getElementById('fade').classList.add('out');
      sessionStorage.setItem('dl-entered', '1');
      window.location.href = 'home.html';
    }
  </script>

</body>
</html>
