name: Update podcast episodes

on:
  schedule:
    - cron: '0 9 * * *'   # daily at 09:00 UTC
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-podcast
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yt-dlp
        run: pip install --upgrade yt-dlp

      - name: Refresh podcast.json
        run: python scripts/update_podcast.py

      - name: Commit & push if changed
        run: |
          if ! git diff --quiet -- podcast.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add podcast.json
            git commit -m "Auto-update podcast episodes [skip ci]"
            git push
          else
            echo "No new episodes."
          fi
